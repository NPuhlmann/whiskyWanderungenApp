name: Release Build

on:
  workflow_dispatch:  # Manueller Trigger
  release:
    types: [published]

env:
  FLUTTER_VERSION: '3.19.0'

jobs:
  release-android:
    name: Android Release Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
        
      - name: Setup Android Keystore
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build/app/outputs/flutter-apk/
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          
      - name: Build Android Release APK
        run: flutter build apk --release
        
      - name: Build Android Release App Bundle
        run: flutter build appbundle --release
        
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: whisky-hikes-android-${{ github.event.release.tag_name }}.apk
          asset_content_type: application/vnd.android.package-archive

  release-ios:
    name: iOS Release Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
        
      - name: Setup iOS Code Signing
        uses: apple-actions/import-codesigning-certs@v1
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}
          
      - name: Build iOS Release
        run: flutter build ios --release
        
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          xcrun altool --export-app --type ios --output-format ipa --output "whisky-hikes-ios.ipa" --export-options-plist ../../../.github/workflows/ios-export-options.plist
          
      - name: Upload iOS Release
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/iphoneos/whisky-hikes-ios.ipa
          
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/ios/iphoneos/whisky-hikes-ios.ipa
          asset_name: whisky-hikes-ios-${{ github.event.release.tag_name }}.ipa
          asset_content_type: application/octet-stream

  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: [release-android, release-ios]
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: Bump version
        id: bump
        run: |
          # Aktuelle Version aus pubspec.yaml extrahieren
          CURRENT_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "Current version: $CURRENT_VERSION"
          
          # Neue Version setzen (+1 für build number)
          VERSION_PART="${CURRENT_VERSION%+*}"
          BUILD_NUMBER="${CURRENT_VERSION##*+}"
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEW_VERSION="${VERSION_PART}+${NEW_BUILD_NUMBER}"
          
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Version in pubspec.yaml aktualisieren
          sed -i "s/version: $CURRENT_VERSION/version: $NEW_VERSION/" pubspec.yaml
          
      - name: Commit and push version bump
        run: |
          git add pubspec.yaml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin main
          
      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [release-android, release-ios]
    if: success()
    
    steps:
      - name: Notify on Success
        run: |
          echo "🎉 Release Build erfolgreich abgeschlossen!"
          echo "Android und iOS Builds wurden erstellt."
          echo "Version: ${{ needs.release-android.outputs.version || 'N/A' }}"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Notify on Failure
        run: |
          echo "❌ Release Build fehlgeschlagen!"
          echo "Bitte überprüfe die GitHub Actions Logs."
