name: Distribute — TestFlight + Play Internal

# Cuts a signed release build on manual dispatch from main and ships it to
# TestFlight (internal group) and Play Store internal testing track.
# Requires all secrets listed in the "Required GitHub Secrets" comment block
# below. Run ci.yml green before triggering this workflow.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes shown to testers'
        required: false
        default: 'Internal test build'
        type: string

env:
  FLUTTER_VERSION: '3.41.7'
  BUNDLE_ID: 'com.puhlmann.whiskyHikes'

# Required GitHub Secrets — add all of these in Settings → Secrets → Actions:
#
# Android:
#   ANDROID_KEYSTORE_BASE64          — upload keystore encoded as base64
#   ANDROID_KEY_ALIAS                — key alias inside the keystore
#   ANDROID_KEYSTORE_PASSWORD        — keystore store password
#   ANDROID_KEY_PASSWORD             — key password
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON — Play Console service account JSON (plain text)
#
# iOS:
#   IOS_P12_BASE64                   — Apple Distribution certificate (.p12) as base64
#   IOS_P12_PASSWORD                 — password for the p12 file
#   IOS_PROVISIONING_PROFILE_BASE64  — App Store distribution profile (.mobileprovision) as base64
#   IOS_PROVISIONING_PROFILE_NAME    — profile name exactly as shown in Xcode / Apple Developer portal
#   APPLE_TEAM_ID                    — 10-character Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY_ID     — App Store Connect API key ID
#   APP_STORE_CONNECT_API_KEY_ISSUER_ID — App Store Connect API issuer UUID
#   APP_STORE_CONNECT_API_KEY_CONTENT   — .p8 private key content (including header/footer lines)

jobs:
  # ── Shared: compute a monotonically increasing build number ───────────────
  build-number:
    name: Compute Build Number
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.bn.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bn
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  # ── Android → Play Store internal track ──────────────────────────────────
  distribute-android:
    name: Android → Play Internal Track
    runs-on: ubuntu-latest
    needs: build-number

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare dotenv
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed App Bundle
        run: |
          flutter build appbundle --release \
            --build-number=${{ needs.build-number.outputs.build_number }}

      - name: Upload to Play Store internal track
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.BUNDLE_ID }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: >-
            ${{ github.ref_name }}-${{ needs.build-number.outputs.build_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── iOS → TestFlight internal group ──────────────────────────────────────
  distribute-ios:
    name: iOS → TestFlight
    runs-on: macos-latest
    needs: build-number

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare dotenv
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Import distribution certificate
        uses: apple-actions/import-codesigning-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" \
            | base64 --decode > "$PROFILES_DIR/dist.mobileprovision"

      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-number=${{ needs.build-number.outputs.build_number }} \
            --export-options-plist=/tmp/ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/whisky_hikes.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14

  # ── Summary ───────────────────────────────────────────────────────────────
  notify:
    name: Distribution Summary
    runs-on: ubuntu-latest
    needs: [distribute-android, distribute-ios]
    if: always()

    steps:
      - name: Report outcome
        run: |
          echo "Android job: ${{ needs.distribute-android.result }}"
          echo "iOS job:     ${{ needs.distribute-ios.result }}"
          if [[ "${{ needs.distribute-android.result }}" == "success" && \
                "${{ needs.distribute-ios.result }}" == "success" ]]; then
            echo "Both platforms distributed successfully."
          else
            echo "One or more distribution jobs failed — check logs above."
            exit 1
          fi
