version: 2
updates:
  # Dart/Flutter Abhängigkeiten
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "nico"
    assignees:
      - "nico"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "dart"
    ignore:
      # Ignoriere Major Version Updates für kritische Pakete
      - dependency-name: "flutter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "flutter_test"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "nico"
    assignees:
      - "nico"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Terraform Abhängigkeiten (falls vorhanden)
  - package-ecosystem: "terraform"
    directory: "/terraform-supabase"
    schedule:
      interval: "monthly"
      day: "1"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    reviewers:
      - "nico"
    assignees:
      - "nico"
    commit-message:
      prefix: "terraform"
      include: "scope"
    labels:
      - "dependencies"
      - "terraform"
